<!-- document type-->
<!DOCTYPE html>

<!-- document -->
<html>

    <!-- metadata -->
    <head>

        <!-- htmx -->
        <script 
            src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.6/dist/htmx.min.js">
        </script>

        <!-- stylesheets-->
        <link rel="stylesheet" href="static/style.css">
    </head>

    <!-- content -->
    <body>

        <!--header -->
        <header>
            <h1>GSDK</h1>
            <i>A modular C SDK with tons of generic data structures, abstractions for performance computing, and highly flexable reflection.</i>
        </header>

        <!-- main -->
        <main>
            {{range $key, $value := .}}
            <div class="package2">
                <h1 id="{{$key}}">{{$key}}</h2>
                <div class="package">
                    <article 
                        hx-get="/package/?name={{$key}}"
                        hx-trigger="revealed"
                        hx-swap="outerHTML"
                    >
                    </article>
                </div>
            </div>
            {{end}}
        </main>
        
        <!-- footer-->
        <footer>

        </footer>
    </body>
</html>
