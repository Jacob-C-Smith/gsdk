<article class='module'>
    
    <header class='module'>

        <div class="module-icon-wrap">
            {{ if .Icon.Single }}
            <img 
                class="module-icon invertable"
                src="static/{{.Icon.Single}}" 
            >
            {{ else }}
            <picture>
                <source 
                    media="(prefers-color-scheme: dark)" 
                    srcset="static/{{.Icon.Dark}}"
                >
                <img 
                    class="module-icon"
                    src="static/{{.Icon.Light}}"
                >
            </picture>
            {{ end }}
        </div>
        
        <div
            class='name_description'
        >
            <h1>{{ .Name }}</h1>
            <i>{{ .Description }}</i>
        </div>
    </header>

    <figure class="example-test">

            {{ else }}
                <button class="test">TODO</button>
            {{ end }}

            {{ if .Tester }}

                <button class="example">Example</button>
            </a>
            {{ else }}

            {{ end }}
         -->

    <nav class="module">
        <b>
            <a href='https://github.com/Jacob-C-Smith/gsdk/tree/main/documentation/{{ .Markdown }}'>README</a> •
            <a href='https://github.com/Jacob-C-Smith/gsdk/tree/main/{{ .Path }}/{{.Name}}.h'>interface</a> • 
            <a href='https://github.com/Jacob-C-Smith/gsdk/tree/main/{{ .Path }}'>source code</a> 
        </b>
    </nav>
</article>
